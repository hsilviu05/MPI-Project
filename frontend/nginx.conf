server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly; fall back to index.html for all other paths
    # so React Router handles client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable build assets aggressively
    location ~* \.(js|css|woff2?|ttf|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for the entry HTML so updates are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
