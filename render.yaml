databases:
  - name: mpi-project-db
    databaseName: mpi_project
    user: mpi_user
    plan: free
    region: frankfurt

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: mpi-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mpi-project-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: PRICE_PROVIDER
        value: alpha_vantage
      # Set PRICE_PROVIDER_API_KEY in the Render dashboard manually
      - key: PRICE_PROVIDER_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://mpi-frontend-s4yg.onrender.com"

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: mpi-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    region: frankfurt
    # VITE_API_BASE_URL must be set manually in the Render dashboard to the
    # backend's public URL (e.g. https://mpi-backend.onrender.com) because
    # it is baked in at build time and fromService is not available for Docker builds.
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://mpi-backend-66d0.onrender.com"
