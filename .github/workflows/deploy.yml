name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  # ── Backend tests must pass before deploying ──────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest backend/tests/ -v

  # ── E2E tests must pass before deploying ─────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mpi_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run database migrations
        working-directory: backend
        run: python -m alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost/mpi_dev

      - name: Start backend
        run: |
          nohup python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          timeout 30 bash -c 'until curl -sf http://localhost:8000/health; do sleep 1; done'
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost/mpi_dev
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: 'true'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --project=chromium
        env:
          CI: 'true'
          BASE_URL: http://localhost:5173
          VITE_API_BASE_URL: http://localhost:8000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Trigger Render deploys via deploy hooks ───────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend-tests, e2e-tests]
    # To add manual approval before deploy: create a 'production' environment
    # in GitHub Settings → Environments, then uncomment the line below.
    # environment: production

    steps:
      - name: Deploy backend to Render
        run: |
          curl -fsSL "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"
          echo "Backend deploy triggered."

      - name: Deploy frontend to Render
        run: |
          curl -fsSL "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
          echo "Frontend deploy triggered."
